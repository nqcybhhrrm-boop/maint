<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Maintenance">
  <meta name="theme-color" content="#2563eb">
  <title>Home Maintenance</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="header" id="app-header">
      <h1>🏠 Home Maintenance</h1>
    </div>

    <!-- Views -->
    <div id="view-dashboard" class="view active"></div>
    <div id="view-detail" class="view"></div>
    <div id="view-add" class="view"></div>
    <div id="view-history" class="view"></div>
    <div id="view-settings" class="view"></div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-nav="dashboard">
        <span class="nav-icon">🏠</span>
        <span>Tasks</span>
      </button>
      <button class="nav-item" data-nav="history">
        <span class="nav-icon">📋</span>
        <span>History</span>
      </button>
      <button class="nav-item" data-nav="settings">
        <span class="nav-icon">⚙️</span>
        <span>Settings</span>
      </button>
    </nav>
  </div>

  <!-- Generate icons on first load -->
  <canvas id="icon-canvas" style="display:none" width="512" height="512"></canvas>

  <script>
    // Generate and cache PWA icons using canvas
    (function generateIcons() {
      const canvas = document.getElementById('icon-canvas');
      const ctx = canvas.getContext('2d');
      function drawIcon(size) {
        canvas.width = size; canvas.height = size;
        const r = size * 0.18;
        ctx.clearRect(0, 0, size, size);
        // Rounded rect background
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(size - r, 0);
        ctx.arcTo(size, 0, size, r, r);
        ctx.lineTo(size, size - r);
        ctx.arcTo(size, size, size - r, size, r);
        ctx.lineTo(r, size);
        ctx.arcTo(0, size, 0, size - r, r);
        ctx.lineTo(0, r);
        ctx.arcTo(0, 0, r, 0, r);
        ctx.closePath();
        ctx.fillStyle = '#2563eb';
        ctx.fill();
        // House emoji
        ctx.font = `${size * 0.58}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🏠', size / 2, size / 2 + size * 0.03);
        return canvas.toDataURL('image/png');
      }

      function cacheIcon(name, dataUrl) {
        fetch(dataUrl)
          .then(r => r.blob())
          .then(blob => {
            // Store as object URL so manifest/link can find it
            const url = URL.createObjectURL(blob);
            // Set the apple-touch-icon
            if (name === '192') {
              const link = document.querySelector('link[rel="apple-touch-icon"]');
              if (link) link.href = url;
            }
          });
      }

      // Generate icons
      if (canvas.getContext) {
        const icon192 = drawIcon(192);
        const icon512 = drawIcon(512);
        cacheIcon('192', icon192);
        cacheIcon('512', icon512);
        // Store for SW
        sessionStorage.setItem('icon192', icon192);
      }
    })();
  </script>
  <script src="/app.js"></script>
</body>
</html>
